<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ikatRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b91c3c"/>
      <stop offset="35%" stop-color="#8f1530"/>
      <stop offset="65%" stop-color="#c4304d"/>
      <stop offset="100%" stop-color="#7a1028"/>
    </linearGradient>
    <linearGradient id="ikatBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e5a8a"/>
      <stop offset="50%" stop-color="#163f63"/>
      <stop offset="100%" stop-color="#245f8f"/>
    </linearGradient>
    <linearGradient id="ikatGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9922a"/>
      <stop offset="50%" stop-color="#f0c14a"/>
      <stop offset="100%" stop-color="#a87418"/>
    </linearGradient>
    <linearGradient id="creamBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3e2c8"/>
      <stop offset="45%" stop-color="#e8d2b0"/>
      <stop offset="100%" stop-color="#dcc29a"/>
    </linearGradient>
    <pattern id="miniDiamond" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M24 4 L44 24 L24 44 L4 24 Z" fill="none" stroke="#7a1028" stroke-width="1.2" opacity="0.35"/>
      <path d="M24 12 L36 24 L24 36 L12 24 Z" fill="#c9922a" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Asos: atlas qizil maydon -->
  <rect width="1440" height="360" fill="url(#ikatRed)"/>

  <!-- Ikat vertikal chiziqlar -->
  <g opacity="0.55">
    <rect x="680" y="0" width="36" height="360" fill="#163f63"/>
    <rect x="720" y="0" width="18" height="360" fill="#f0c14a"/>
    <rect x="748" y="0" width="28" height="360" fill="#6b3a7a"/>
    <rect x="790" y="0" width="14" height="360" fill="#1a7a72"/>
    <rect x="820" y="0" width="40" height="360" fill="#245f8f"/>
    <rect x="870" y="0" width="20" height="360" fill="#c4304d"/>
    <rect x="900" y="0" width="32" height="360" fill="#163f63"/>
    <rect x="950" y="0" width="16" height="360" fill="#f0c14a"/>
    <rect x="980" y="0" width="44" height="360" fill="#8f1530"/>
    <rect x="1040" y="0" width="22" height="360" fill="#1a7a72"/>
    <rect x="1080" y="0" width="38" height="360" fill="#6b3a7a"/>
    <rect x="1130" y="0" width="18" height="360" fill="#245f8f"/>
    <rect x="1160" y="0" width="30" height="360" fill="#c9922a"/>
    <rect x="1200" y="0" width="240" height="360" fill="url(#ikatBlue)" opacity="0.85"/>
  </g>

  <!-- Chap hashiya  matn uchun tabiiy krem atlas zola -->
  <rect x="0" y="0" width="620" height="360" fill="url(#creamBand)"/>
  <rect x="0" y="0" width="28" height="360" fill="url(#ikatGold)"/>
  <rect x="36" y="0" width="8" height="360" fill="#8f1530"/>
  <rect x="52" y="0" width="16" height="360" fill="#163f63"/>
  <rect x="76" y="0" width="8" height="360" fill="#c9922a"/>
  <rect x="592" y="0" width="28" height="360" fill="url(#ikatGold)"/>

  <!-- Hashiya romblari -->
  <g fill="none" stroke-width="2">
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#8f1530" transform="translate(0 0)"/>
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#163f63" transform="translate(0 120)"/>
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#c9922a" transform="translate(0 240)"/>
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#8f1530" transform="translate(606 40)"/>
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#163f63" transform="translate(606 120)"/>
    <path d="M14 40 L34 60 L14 80 L-6 60 Z" stroke="#c9922a" transform="translate(606 240)"/>
  </g>

  <!-- Krem zola ichidagi naqsh -->
  <rect x="100" y="0" width="480" height="360" fill="url(#miniDiamond)" opacity="0.5"/>

  <!-- O'ng tomonda katta atlas gullari -->
  <g transform="translate(760 180)">
    <path d="M0 -70 L70 0 L0 70 L-70 0 Z" fill="none" stroke="#f0c14a" stroke-width="3"/>
    <path d="M0 -50 L50 0 L0 50 L-50 0 Z" fill="#163f63" opacity="0.55"/>
    <path d="M0 -32 L32 0 L0 32 L-32 0 Z" fill="#c4304d" opacity="0.7"/>
    <path d="M0 -16 L16 0 L0 16 L-16 0 Z" fill="#f0c14a" opacity="0.85"/>
    <circle cx="0" cy="0" r="10" fill="#8f1530"/>
  </g>
  <g transform="translate(980 100)">
    <path d="M0 -55 L55 0 L0 55 L-55 0 Z" fill="none" stroke="#f0c14a" stroke-width="2.5"/>
    <path d="M0 -38 L38 0 L0 38 L-38 0 Z" fill="#6b3a7a" opacity="0.6"/>
    <path d="M0 -20 L20 0 L0 20 L-20 0 Z" fill="#1a7a72" opacity="0.75"/>
    <circle cx="0" cy="0" r="8" fill="#f0c14a"/>
  </g>
  <g transform="translate(1180 240)">
    <path d="M0 -60 L60 0 L0 60 L-60 0 Z" fill="none" stroke="#f0c14a" stroke-width="2.8"/>
    <path d="M0 -42 L42 0 L0 42 L-42 0 Z" fill="#245f8f" opacity="0.65"/>
    <path d="M0 -22 L22 0 L0 22 L-22 0 Z" fill="#c4304d" opacity="0.8"/>
    <circle cx="0" cy="0" r="9" fill="#163f63"/>
  </g>
  <g transform="translate(1320 120)">
    <path d="M0 -45 L45 0 L0 45 L-45 0 Z" fill="none" stroke="#f0c14a" stroke-width="2"/>
    <path d="M0 -28 L28 0 L0 28 L-28 0 Z" fill="#c9922a" opacity="0.5"/>
    <circle cx="0" cy="0" r="7" fill="#8f1530"/>
  </g>

  <!-- Tumor / anor naqshlari -->
  <g transform="translate(870 280)">
    <circle cx="0" cy="0" r="28" fill="#c4304d" opacity="0.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#f0c14a" stroke-width="2"/>
    <path d="M0 -8 C8 -8 8 8 0 8 C-8 8 -8 -8 0 -8" fill="#163f63" opacity="0.6"/>
  </g>
  <g transform="translate(1050 60)">
    <circle cx="0" cy="0" r="22" fill="#6b3a7a" opacity="0.45"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#f0c14a" stroke-width="1.8"/>
  </g>

  <!-- Tolqin hashiya pastki -->
  <path d="M620 320 Q780 280 940 320 T1300 310 L1440 320 L1440 360 L620 360 Z" fill="#163f63" opacity="0.35"/>
  <path d="M620 340 Q800 300 1000 340 T1440 330 L1440 360 L620 360 Z" fill="url(#ikatGold)" opacity="0.4"/>
</svg>

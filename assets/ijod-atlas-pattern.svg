<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <pattern id="atlas" width="240" height="240" patternUnits="userSpaceOnUse">
      <!-- Ikat asos ranglari -->
      <rect width="240" height="240" fill="#fdf3ea"/>

      <!-- Vertikal ikat chiziqlar -->
      <rect x="0" y="0" width="30" height="240" fill="#c0354a" opacity="0.08"/>
      <rect x="60" y="0" width="24" height="240" fill="#1a96a8" opacity="0.1"/>
      <rect x="120" y="0" width="28" height="240" fill="#7b3f00" opacity="0.07"/>
      <rect x="180" y="0" width="22" height="240" fill="#9e5bd6" opacity="0.09"/>

      <!-- Atlas romb (tumor / qalampir naqsh) -->
      <g transform="translate(60 60)" opacity="0.55">
        <path d="M0 -28 L28 0 L0 28 L-28 0 Z" fill="none" stroke="#c0354a" stroke-width="2.2"/>
        <path d="M0 -18 L18 0 L0 18 L-18 0 Z" fill="#e6821e" opacity="0.35"/>
        <path d="M0 -10 L10 0 L0 10 L-10 0 Z" fill="#c0354a" opacity="0.45"/>
        <circle cx="0" cy="0" r="4" fill="#7b3f00" opacity="0.5"/>
      </g>

      <g transform="translate(180 60)" opacity="0.5">
        <path d="M0 -26 L26 0 L0 26 L-26 0 Z" fill="none" stroke="#1a96a8" stroke-width="2"/>
        <path d="M0 -16 L16 0 L0 16 L-16 0 Z" fill="#1a96a8" opacity="0.22"/>
        <path d="M0 -8 L8 0 L0 8 L-8 0 Z" fill="#9e5bd6" opacity="0.35"/>
      </g>

      <g transform="translate(60 180)" opacity="0.5">
        <path d="M0 -26 L26 0 L0 26 L-26 0 Z" fill="none" stroke="#9e5bd6" stroke-width="2"/>
        <path d="M0 -16 L16 0 L0 16 L-16 0 Z" fill="#c0354a" opacity="0.2"/>
      </g>

      <g transform="translate(180 180)" opacity="0.52">
        <path d="M0 -28 L28 0 L0 28 L-28 0 Z" fill="none" stroke="#e6821e" stroke-width="2.2"/>
        <path d="M0 -18 L18 0 L0 18 L-18 0 Z" fill="#1a96a8" opacity="0.28"/>
        <circle cx="0" cy="0" r="4" fill="#c0354a" opacity="0.45"/>
      </g>

      <!-- Markaziy gul naqsh -->
      <g transform="translate(120 120)" opacity="0.48">
        <circle cx="0" cy="0" r="22" fill="none" stroke="#c0354a" stroke-width="1.8"/>
        <circle cx="0" cy="0" r="14" fill="none" stroke="#e6821e" stroke-width="1.4"/>
        <path d="M0 -20 L6 -6 L20 -6 L9 2 L14 16 L0 8 L-14 16 L-9 2 L-20 -6 L-6 -6 Z" fill="#9e5bd6" opacity="0.28"/>
        <circle cx="0" cy="0" r="5" fill="#7b3f00" opacity="0.4"/>
      </g>

      <!-- Tosbaga / tolqin chegarasi -->
      <path d="M0 120 Q30 100 60 120 T120 120 T180 120 T240 120" fill="none" stroke="#1a96a8" stroke-width="1.2" opacity="0.25"/>
      <path d="M0 0 Q30 20 60 0 T120 0 T180 0 T240 0" fill="none" stroke="#c0354a" stroke-width="1.2" opacity="0.22"/>
      <path d="M120 0 Q140 30 120 60 T120 120 T120 180 T120 240" fill="none" stroke="#e6821e" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="240" height="240" fill="url(#atlas)"/>
</svg>
